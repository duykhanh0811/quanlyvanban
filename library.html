{% extends "base.html" %}

{% block content %}

<h3 class="mb-4">📚 Văn bản lưu trữ</h3>

<!-- SEARCH -->
<form method="get" class="mb-3 d-flex">
    <input type="text" name="search" value="{{search}}" 
           class="form-control me-2" placeholder="Tìm kiếm...">
    <button class="btn btn-primary">Tìm</button>
</form>

<div class="card p-3">

<table class="table table-bordered table-hover text-center">
    <thead class="table-dark">
        <tr>
            <th>Mã VB</th>
            <th>Trích yếu</th>
            <th>Lĩnh vực</th>
            <th>Cơ quan</th>
            <th>Ngày ban hành</th>
            <th>Người tạo</th>
            <th>Hành động</th>
        </tr>
    </thead>

    <tbody>
    {% for doc in docs %}
    <tr>
        <td>{{doc.code}}</td>
        <td>{{doc.title}}</td>
        <td>{{doc.field}}</td>
        <td>{{doc.agency}}</td>
        <td>{{doc.created_at}}</td>
        <td>{{doc.sender}}</td>
        <td>
            <a href="/file/{{doc.filename}}" class="btn btn-warning btn-sm">Xem</a>
        </td>
    </tr>
    {% endfor %}
    </tbody>

</table>

</div>

{% endblock %}
