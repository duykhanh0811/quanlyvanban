<!DOCTYPE html>
<html>
<head>
    <title>Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body, html {
            height: 100%;
            margin: 0;
        }

        .bg {
            position: fixed;
            width: 100%;
            height: 100%;
            background: url("{{ url_for('static', filename='giang-duong-utt.jpg') }}") no-repeat center;
            background-size: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: -1;
        }

        .login-box {
            width: 350px;
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="d-flex justify-content-center align-items-center vh-100">
    <div class="card login-box p-4 shadow">
        <h3 class="text-center mb-3">🔐 Đăng nhập</h3>

        <form method="post">
            <input class="form-control mb-2" name="username" placeholder="Tài khoản" required>
            <input class="form-control mb-3" type="password" name="password" placeholder="Mật khẩu" required>

            <button class="btn btn-primary w-100">Đăng nhập</button>
        </form>

    </div>
</div>

</body>
</html>
